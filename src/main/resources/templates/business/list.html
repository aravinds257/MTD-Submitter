<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Businesses</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Your Businesses</h2>
        <a th:href="@{/businesses/add}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>Add Business
        </a>
    </div>

    <div th:if="${#lists.isEmpty(businesses)}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">
            <i class="bi bi-building fs-1 text-muted mb-3"></i>
            <h4>No businesses added yet</h4>
            <p class="text-muted">Add your self-employment or property income source.</p>
            <a th:href="@{/businesses/add}" class="btn btn-primary btn-lg">Add your first business</a>
        </div>
    </div>

    <div th:each="business : ${businesses}" class="card border-0 shadow-sm mb-3">
        <div class="card-body d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <div class="rounded-circle bg-primary bg-opacity-10 p-3 me-3">
                    <i class="bi fs-4 text-primary"
                       th:classappend="${business.businessType.name() == 'SELF_EMPLOYMENT'} ? 'bi-briefcase' : 'bi-house'"></i>
                </div>
                <div>
                    <h5 class="mb-0 fw-semibold" th:text="${business.tradingName ?: 'Unnamed'}">Business</h5>
                    <small class="text-muted" th:text="${business.businessType.displayLabel}">Self-Employment</small>
                    <span class="badge bg-secondary ms-2" th:text="${business.accountingType.displayLabel}">Cash</span>
                </div>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{'/income?businessId=' + ${business.id}}" class="btn btn-sm btn-outline-success">
                    <i class="bi bi-arrow-down-circle me-1"></i>Income
                </a>
                <a th:href="@{'/expenses?businessId=' + ${business.id}}" class="btn btn-sm btn-outline-danger">
                    <i class="bi bi-arrow-up-circle me-1"></i>Expenses
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
