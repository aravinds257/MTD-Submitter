<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Create Account</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm border-0 mt-5">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-receipt-cutoff fs-1 text-primary"></i>
                        <h3 class="fw-bold mt-2">Create your account</h3>
                        <p class="text-muted">Start your 14-day free trial</p>
                    </div>

                    <form th:action="@{/register}" th:object="${registerForm}" method="post">
                        <div class="mb-3">
                            <label for="fullName" class="form-label fw-medium">Full name</label>
                            <input type="text" class="form-control form-control-lg" id="fullName"
                                   th:field="*{fullName}" placeholder="John Smith"
                                   th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('fullName')}"
                                 th:errors="*{fullName}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-medium">Email address</label>
                            <input type="email" class="form-control form-control-lg" id="email"
                                   th:field="*{email}" placeholder="you@example.com"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-medium">Password</label>
                            <input type="password" class="form-control form-control-lg" id="password"
                                   th:field="*{password}" placeholder="Min. 8 characters"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}"></div>
                        </div>
                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label fw-medium">Confirm password</label>
                            <input type="password" class="form-control form-control-lg" id="confirmPassword"
                                   th:field="*{confirmPassword}" placeholder="Re-enter password"
                                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}"
                                 th:errors="*{confirmPassword}"></div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">Create account</button>

                        <p class="text-muted small text-center mt-3">
                            By creating an account, you agree to our
                            <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
                        </p>
                    </form>

                    <p class="text-center mt-3 mb-0">
                        Already have an account?
                        <a th:href="@{/login}" class="text-primary fw-semibold">Log in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
