<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Log in</title>
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm border-0 mt-5">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-receipt-cutoff fs-1 text-primary"></i>
                        <h3 class="fw-bold mt-2">Welcome back</h3>
                        <p class="text-muted">Log in to your MTD Submitter account</p>
                    </div>

                    <!-- Success message (after registration) -->
                    <div th:if="${param.logout}" class="alert alert-info">
                        <i class="bi bi-info-circle me-2"></i>You have been logged out.
                    </div>
                    <div th:if="${success}" class="alert alert-success">
                        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
                    </div>
                    <div th:if="${param.error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle me-2"></i>Invalid email or password.
                    </div>
                    <div th:if="${param.expired}" class="alert alert-warning">
                        <i class="bi bi-clock me-2"></i>Your session has expired. Please log in again.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-medium">Email address</label>
                            <input type="email" class="form-control form-control-lg" id="username"
                                   name="username" placeholder="you@example.com" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-medium">Password</label>
                            <input type="password" class="form-control form-control-lg" id="password"
                                   name="password" placeholder="••••••••" required>
                        </div>
                        <div class="d-flex justify-content-between mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember-me" name="remember-me">
                                <label class="form-check-label" for="remember-me">Remember me</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">Log in</button>
                    </form>

                    <p class="text-center mt-4 mb-0">
                        Don't have an account?
                        <a th:href="@{/register}" class="text-primary fw-semibold">Start free trial</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
