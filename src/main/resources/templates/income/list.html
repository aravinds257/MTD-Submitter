<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Income</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold"><i class="bi bi-arrow-down-circle text-success me-2"></i>Income</h2>
        <a th:href="@{/income/add}" class="btn btn-success">
            <i class="bi bi-plus-circle me-1"></i>Add Income
        </a>
    </div>

    <!-- Business Selector -->
    <div class="card border-0 shadow-sm mb-4" th:if="${!#lists.isEmpty(businesses)}">
        <div class="card-body">
            <form th:action="@{/income}" method="get" class="d-flex align-items-center gap-3">
                <label class="fw-medium text-nowrap">Select business:</label>
                <select name="businessId" class="form-select" onchange="this.form.submit()">
                    <option value="">Choose...</option>
                    <option th:each="b : ${businesses}" th:value="${b.id}"
                            th:text="${b.tradingName ?: b.businessType.displayLabel}"
                            th:selected="${b.id == selectedBusinessId}"></option>
                </select>
            </form>
        </div>
    </div>

    <!-- Records Table -->
    <div th:if="${records != null}" class="card border-0 shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <span class="fw-semibold">
                Tax Year <span th:text="${taxYear.label}">2026-27</span>
                &middot; <span th:text="${#lists.size(records)}">0</span> records
            </span>
            <span class="fw-bold text-success fs-5">
                Total: £<span th:text="${#numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}">0.00</span>
            </span>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(records)}" class="text-center py-5">
                <i class="bi bi-inbox text-muted fs-1"></i>
                <p class="text-muted mt-2">No income recorded yet for this business.</p>
                <a th:href="@{/income/add}" class="btn btn-success">Add your first income</a>
            </div>
            <div th:if="${!#lists.isEmpty(records)}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th class="text-end">Amount</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="record : ${records}">
                            <td th:text="${#temporals.format(record.transactionDate, 'dd MMM yyyy')}">01 Jul 2026</td>
                            <td th:text="${record.description ?: '-'}" class="text-truncate" style="max-width: 250px;">Payment</td>
                            <td><span class="badge bg-success bg-opacity-10 text-success" th:text="${record.incomeCategory}">Turnover</span></td>
                            <td class="text-end fw-semibold">£<span th:text="${#numbers.formatDecimal(record.amount, 1, 'COMMA', 2, 'POINT')}">0.00</span></td>
                            <td class="text-end">
                                <form th:action="@{'/income/' + ${record.id} + '/delete'}" method="post" class="d-inline"
                                      onsubmit="return confirm('Delete this income record?')">
                                    <input type="hidden" name="businessId" th:value="${selectedBusinessId}">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
