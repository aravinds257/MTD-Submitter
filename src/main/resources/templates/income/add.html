<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Add Income</title></head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <a th:href="@{/income}" class="text-muted text-decoration-none mb-3 d-block">
                <i class="bi bi-arrow-left me-1"></i>Back to income
            </a>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h3 class="fw-bold mb-4"><i class="bi bi-arrow-down-circle text-success me-2"></i>Add Income</h3>

                    <form th:action="@{/income/add}" th:object="${incomeForm}" method="post">
                        <div class="mb-3">
                            <label for="businessId" class="form-label fw-medium">Business</label>
                            <select class="form-select form-select-lg" id="businessId" th:field="*{businessId}"
                                    th:classappend="${#fields.hasErrors('businessId')} ? 'is-invalid' : ''">
                                <option value="">Select business...</option>
                                <option th:each="b : ${businesses}" th:value="${b.id}"
                                        th:text="${b.tradingName ?: b.businessType.displayLabel}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('businessId')}" th:errors="*{businessId}"></div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="transactionDate" class="form-label fw-medium">Date</label>
                                <input type="date" class="form-control form-control-lg" id="transactionDate"
                                       th:field="*{transactionDate}"
                                       th:classappend="${#fields.hasErrors('transactionDate')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('transactionDate')}" th:errors="*{transactionDate}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="amount" class="form-label fw-medium">Amount (£)</label>
                                <input type="number" step="0.01" min="0.01" class="form-control form-control-lg" id="amount"
                                       th:field="*{amount}" placeholder="0.00"
                                       th:classappend="${#fields.hasErrors('amount')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="incomeCategory" class="form-label fw-medium">Category</label>
                            <select class="form-select" id="incomeCategory" th:field="*{incomeCategory}"
                                    th:classappend="${#fields.hasErrors('incomeCategory')} ? 'is-invalid' : ''">
                                <option value="">Select category...</option>
                                <option th:each="cat : ${categories}" th:value="${cat.hmrcFieldName}"
                                        th:text="${cat.displayLabel}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('incomeCategory')}" th:errors="*{incomeCategory}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-medium">Description <span class="text-muted">(optional)</span></label>
                            <input type="text" class="form-control" id="description"
                                   th:field="*{description}" placeholder="e.g., Invoice #123 from ABC Ltd">
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100">
                            <i class="bi bi-plus-circle me-1"></i>Record Income
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
