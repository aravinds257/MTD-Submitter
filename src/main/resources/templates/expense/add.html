<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head><title>Add Expense</title></head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <a th:href="@{/expenses}" class="text-muted text-decoration-none mb-3 d-block">
                <i class="bi bi-arrow-left me-1"></i>Back to expenses
            </a>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h3 class="fw-bold mb-4"><i class="bi bi-arrow-up-circle text-danger me-2"></i>Add Expense</h3>

                    <form th:action="@{/expenses/add}" th:object="${expenseForm}" method="post">
                        <div class="mb-3">
                            <label for="businessId" class="form-label fw-medium">Business</label>
                            <select class="form-select form-select-lg" id="businessId" th:field="*{businessId}"
                                    th:classappend="${#fields.hasErrors('businessId')} ? 'is-invalid' : ''"
                                    onchange="updateExpenseCategories()">
                                <option value="">Select business...</option>
                                <option th:each="b : ${businesses}" th:value="${b.id}"
                                        th:text="${b.tradingName ?: b.businessType.displayLabel}"
                                        th:data-type="${b.businessType.name()}"></option>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('businessId')}" th:errors="*{businessId}"></div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="transactionDate" class="form-label fw-medium">Date</label>
                                <input type="date" class="form-control form-control-lg" id="transactionDate"
                                       th:field="*{transactionDate}"
                                       th:classappend="${#fields.hasErrors('transactionDate')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('transactionDate')}" th:errors="*{transactionDate}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="amount" class="form-label fw-medium">Amount (£)</label>
                                <input type="number" step="0.01" min="0.01" class="form-control form-control-lg" id="amount"
                                       th:field="*{amount}" placeholder="0.00"
                                       th:classappend="${#fields.hasErrors('amount')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="expenseCategory" class="form-label fw-medium">HMRC Category</label>
                            <!-- Self-employment categories (shown by default) -->
                            <select class="form-select" id="expenseCategory" th:field="*{expenseCategory}"
                                    th:classappend="${#fields.hasErrors('expenseCategory')} ? 'is-invalid' : ''">
                                <option value="">Select category...</option>
                                <optgroup label="Self-Employment">
                                    <option th:each="cat : ${selfEmploymentCategories}"
                                            th:if="${cat.name() != 'CONSOLIDATED_EXPENSES'}"
                                            th:value="${cat.hmrcFieldName}"
                                            th:text="${cat.displayLabel}"></option>
                                </optgroup>
                                <optgroup label="UK Property">
                                    <option th:each="cat : ${propertyCategories}"
                                            th:if="${cat.name() != 'CONSOLIDATED_EXPENSES'}"
                                            th:value="${cat.hmrcFieldName}"
                                            th:text="${cat.displayLabel}"></option>
                                </optgroup>
                            </select>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('expenseCategory')}" th:errors="*{expenseCategory}"></div>
                            <div class="form-text">Choose the HMRC category that best fits this expense.</div>
                        </div>

                        <div class="mb-4">
                            <label for="description" class="form-label fw-medium">Description <span class="text-muted">(optional)</span></label>
                            <input type="text" class="form-control" id="description"
                                   th:field="*{description}" placeholder="e.g., Office supplies from Staples">
                        </div>

                        <button type="submit" class="btn btn-danger btn-lg w-100">
                            <i class="bi bi-plus-circle me-1"></i>Record Expense
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
