server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: false  # true in prod
        same-site: lax

spring:
  application:
    name: mtd-submitter
  datasource:
    url: jdbc:postgresql://localhost:5432/mtdsubmitter
    username: mtdsubmitter
    password: mtdsubmitter_dev
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
  security:
    oauth2:
      client:
        registration:
          hmrc:
            client-id: ${HMRC_CLIENT_ID:your-sandbox-client-id}
            client-secret: ${HMRC_CLIENT_SECRET:your-sandbox-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/callback/hmrc"
            scope: read:self-assessment,write:self-assessment
        provider:
          hmrc:
            authorization-uri: https://test-api.service.hmrc.gov.uk/oauth/authorize
            token-uri: https://test-api.service.hmrc.gov.uk/oauth/token

hmrc:
  api:
    base-url: https://test-api.service.hmrc.gov.uk

jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:dev-encryption-key-change-in-prod}
    algorithm: PBEWithMD5AndDES

stripe:
  api-key: ${STRIPE_API_KEY:sk_test_placeholder}
  price-id: ${STRIPE_PRICE_ID:price_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

app:
  subscription:
    trial-days: 14
    price-monthly: 9.99

logging:
  level:
    com.mtdsubmitter: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
