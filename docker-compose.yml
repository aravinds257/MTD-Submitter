version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: mtd-submitter-db
    environment:
      POSTGRES_DB: mtdsubmitter
      POSTGRES_USER: mtdsubmitter
      POSTGRES_PASSWORD: mtdsubmitter_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mtdsubmitter"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
